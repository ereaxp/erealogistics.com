<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#F7F8F3" />
    <style>
      html:not(.fonts-ready) body { opacity: 0; }
      @font-face {
        font-family: 'Concourse';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('%sveltekit.assets%/fonts/concourse_ot_3_book.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Concourse';
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url('%sveltekit.assets%/fonts/concourse_ot_4_medium.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Concourse';
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url('%sveltekit.assets%/fonts/concourse_ot_6_semibold.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Equity';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('%sveltekit.assets%/fonts/equity_b_regular.woff2') format('woff2');
      }
    </style>
    <link rel="preload" href="%sveltekit.assets%/fonts/concourse_ot_3_book.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="%sveltekit.assets%/fonts/equity_b_regular.woff2" as="font" type="font/woff2" crossorigin />
    <script>
      (function() {
        var d = document.documentElement;
        var params = new URLSearchParams(window.location.search);
        var urlLang = params.get('lang');
        if (!urlLang) {
          try { urlLang = localStorage.getItem('erea-logistics-lang'); } catch (e) {}
        }
        if (urlLang === 'en') {
          d.lang = 'en';
        }
        if (document.fonts) {
          document.fonts.ready.then(function() { d.classList.add('fonts-ready'); });
        } else {
          d.classList.add('fonts-ready');
        }
        setTimeout(function() { d.classList.add('fonts-ready'); }, 400);
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <a href="#hero" class="skip-link">Skip to main content</a>
    <noscript><style>[data-reveal]{opacity:1!important}</style></noscript>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
